<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BalancedGlobalEnergy</title>
    <style>
        :root {
            --primary: #00ffcc;
            --accent: #00aa88;
            --bg-dark: #111;
            --bg-map: #0a1f2e;
            --neon-green: #00ff99;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }

        /* Menú Principal */
        h1 { font-size: 38pt; font-weight: bold; color: var(--primary); margin-bottom: 10px; }
        .subtitle { font-size: 18pt; margin-bottom: 50px; }
        
        button {
            background-color: var(--accent);
            color: white;
            border: none;
            width: 400px;
            height: 60px;
            font-size: 18pt;
            font-weight: bold;
            margin: 15px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
        }
        button:hover { filter: brightness(1.2); }

        /* Pestañas (Notebook) */
        .notebook { width: 1400px; height: 850px; display: flex; flex-direction: column; }
        .tabs { display: flex; background: #222; }
        .tab { padding: 10px 30px; cursor: pointer; background: #333; border: 1px solid #444; }
        .tab.active-tab { background: #111; border-bottom: none; color: var(--primary); }
        .content { flex-grow: 1; display: none; position: relative; }
        .content.active-content { display: block; }

        /* Mapa */
        #map-canvas { background-color: var(--bg-map); margin-top: 10px; }
        #timer { font-size: 18pt; font-weight: bold; margin-top: 10px; }

        /* Consola IA */
        .pc-container { text-align: center; padding: 20px; }
        .console-box {
            background: black;
            border: 5px ridge #555;
            width: 600px;
            height: 300px;
            margin: 20px auto;
            color: var(--neon-green);
            font-family: 'Consolas', monospace;
            text-align: left;
            padding: 15px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        input {
            font-size: 16pt;
            padding: 5px;
            width: 300px;
            margin: 10px;
            background: #222;
            border: 1px solid #444;
            color: white;
            text-align: center;
        }

        /* Historial */
        .listbox {
            background: white;
            color: black;
            width: 800px;
            height: 400px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            margin: 20px;
            text-align: left;
            padding: 10px;
        }
        .list-item { padding: 5px; border-bottom: 1px solid #ccc; }
    </style>
</head>
<body>

    <!-- SCREEN: MENU -->
    <div id="screen-menu" class="screen active">
        <h1>BalancedGlobalEnergy</h1>
        <div class="subtitle">Sistema mundial de equilibrio energético</div>
        <button onclick="iniciarPartida()">INICIAR PARTIDA</button>
        <button onclick="verPartidas()">PARTIDAS GUARDADAS</button>
        <button onclick="window.close()">SALIR</button>
    </div>

    <!-- SCREEN: GAME -->
    <div id="screen-game" class="screen">
        <div class="notebook">
            <div class="tabs">
                <div id="t-map" class="tab active-tab" onclick="switchTab('map')">Mapa Mundial</div>
                <div id="t-pc" class="tab" onclick="switchTab('pc')">Ordenador IA</div>
            </div>

            <!-- Tab Mapa -->
            <div id="c-map" class="content active-content" style="background-color: #001219; text-align: center;">
                <div id="timer">Tiempo: 0s</div>
                <canvas id="map-canvas" width="1300" height="700"></canvas>
            </div>

            <!-- Tab PC IA -->
            <div id="c-pc" class="content" style="background-color: #111;">
                <div class="pc-container">
                    <div style="font-size: 28pt; font-weight: bold; color: var(--neon-green); font-family: Consolas;">SISTEMA DE IA ENERGÉTICA</div>
                    <div id="info-apagado" style="font-size: 18pt; margin: 10px;">CONTINENTE APAGADO: ---</div>
                    
                    <div class="console-box" id="ia-text"></div>

                    <label style="font-size: 14pt;">Número del continente origen</label><br>
                    <input type="number" id="input-cont" min="1" max="7"><br>
                    <label style="font-size: 14pt;">Porcentaje de energía a transferir</label><br>
                    <input type="number" id="input-energia" step="0.1"><br>
                    
                    <button onclick="resolver()" style="width: 250px; margin-top: 20px;">EJECUTAR IA</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SCREEN: FINAL -->
    <div id="screen-final" class="screen">
        <h1 style="color: var(--neon-green);">MISIÓN COMPLETADA</h1>
        <div id="final-tiempo" class="subtitle" style="margin-bottom: 10px;">Tiempo empleado: 0 segundos</div>
        <div id="final-precision" class="subtitle">Precisión energética: 0%</div>
        <button onclick="showScreen('screen-menu')" style="margin-top: 40px;">VOLVER AL MENÚ</button>
    </div>

    <!-- SCREEN: HISTORIAL -->
    <div id="screen-history" class="screen">
        <h1 style="color: white;">PARTIDAS GUARDADAS</h1>
        <div id="history-list" class="listbox"></div>
        <button onclick="showScreen('screen-menu')">VOLVER</button>
    </div>

    <script>
        const CONTINENTES = ["América Norte", "América Sur", "Europa", "África", "Asia", "Oceanía", "Antártida"];
        const COLORES = {
            "América Norte": "#3498db", "América Sur": "#2ecc71", "Europa": "#f1c40f",
            "África": "#e67e22", "Asia": "#e74c3c", "Oceanía": "#9b59b6", "Antártida": "#95a5a6"
        };
        const IDEAL = 100 / CONTINENTES.length;

        let energias = {};
        let apagado = "";
        let startTime = 0;
        let timerInterval;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'screen-menu') clearInterval(timerInterval);
        }

        function iniciarPartida() {
            showScreen('screen-game');
            switchTab('map');
            
            startTime = Date.now();
            apagado = CONTINENTES[Math.floor(Math.random() * CONTINENTES.length)];
            
            // Lógica de repartición idéntica a Python
            let restantes = 100;
            let activos = CONTINENTES.filter(c => c !== apagado);
            let porcentajes = [];

            for(let i=0; i < activos.length - 1; i++) {
                let valor = Math.floor(Math.random() * (24 - 8 + 1)) + 8;
                porcentajes.push(valor);
                restantes -= valor;
            }
            porcentajes.push(restantes);
            porcentajes.sort(() => Math.random() - 0.5);

            CONTINENTES.forEach(c => energias[c] = 0);
            activos.forEach((c, i) => energias[c] = porcentajes[i]);

            document.getElementById('info-apagado').innerText = `CONTINENTE APAGADO: ${apagado.toUpperCase()}`;
            
            timerInterval = setInterval(actualizarTiempo, 1000);
            updateUI();
        }

        function actualizarTiempo() {
            let tiempo = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('timer').innerText = `Tiempo: ${tiempo}s`;
        }

        function switchTab(tab) {
            document.getElementById('t-map').className = tab === 'map' ? 'tab active-tab' : 'tab';
            document.getElementById('t-pc').className = tab === 'pc' ? 'tab active-tab' : 'tab';
            document.getElementById('c-map').className = tab === 'map' ? 'content active-content' : 'content';
            document.getElementById('c-pc').className = tab === 'pc' ? 'content active-content' : 'content';
        }

        function updateUI() {
            renderMapa();
            renderConsola();
        }

        function renderMapa() {
            const canvas = document.getElementById('map-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "white";
            ctx.font = "bold 24pt Arial";
            ctx.textAlign = "center";
            ctx.fillText("BALANCED GLOBAL ENERGY MAP", 650, 60);

            function drawPolygon(pts, name, id, x, y) {
                ctx.beginPath();
                ctx.moveTo(pts[0], pts[1]);
                for(let i=2; i<pts.length; i+=2) ctx.lineTo(pts[i], pts[i+1]);
                ctx.closePath();
                ctx.fillStyle = (name === apagado) ? "black" : COLORES[name];
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.fillStyle = "white";
                ctx.font = "bold 12pt Arial";
                ctx.fillText(`${id}`, x, y-20);
                ctx.fillText(name, x, y);
                ctx.fillText(`${energias[name]}%`, x, y+20);
            }

            // Polígonos exactos basados en el código Tkinter
            drawPolygon([80,120, 240,80, 310,150, 290,260, 180,320, 100,250], "América Norte", 1, 190, 190);
            drawPolygon([260,340, 330,420, 350,560, 300,650, 240,600, 210,480], "América Sur", 2, 290, 500);
            drawPolygon([520,120, 610,100, 660,160, 620,220, 540,200], "Europa", 3, 590, 160);
            drawPolygon([560,260, 670,280, 720,420, 640,560, 540,520, 500,360], "África", 4, 620, 400);
            drawPolygon([760,120, 1050,100, 1180,240, 1110,380, 980,400, 850,330, 720,220], "Asia", 5, 950, 250);
            drawPolygon([1030,470, 1130,500, 1160,580, 1080,620, 980,570], "Oceanía", 6, 1080, 560);
            
            // Antártida (Rectangle)
            ctx.fillStyle = (apagado === "Antártida") ? "black" : COLORES["Antártida"];
            ctx.fillRect(350, 650, 600, 40);
            ctx.strokeStyle = "white";
            ctx.strokeRect(350, 650, 600, 40);
            ctx.fillStyle = "white";
            ctx.fillText(`7 Antártida ${energias["Antártida"]}%`, 650, 675);
        }

        function renderConsola() {
            let txt = "=== RED ELÉCTRICA GLOBAL ===\n\n";
            CONTINENTES.forEach((c, i) => {
                txt += `${i+1}. ${c} --> ${energias[c]}%\n`;
            });
            txt += `\nOBJETIVO IDEAL: ${IDEAL.toFixed(2)}% POR CONTINENTE`;
            document.getElementById('ia-text').innerText = txt;
        }

        function resolver() {
            let idx = parseInt(document.getElementById('input-cont').value) - 1;
            let cant = parseFloat(document.getElementById('input-energia').value);

            if(isNaN(idx) || idx < 0 || idx >= 7) return;
            let origen = CONTINENTES[idx];

            if(origen === apagado || cant <= 0 || energias[origen] < cant) {
                alert("Operación inválida: Verifique ID o Energía disponible");
                return;
            }

            energias[origen] = parseFloat((energias[origen] - cant).toFixed(1));
            energias[apagado] = parseFloat((energias[apagado] + cant).toFixed(1));

            let diferencia = 0;
            CONTINENTES.forEach(c => diferencia += Math.abs(energias[c] - IDEAL));
            let precision = Math.max(0, Math.floor(100 - diferencia * 2));
            let tiempo = Math.floor((Date.now() - startTime) / 1000);

            guardarPartida(tiempo, precision);
            
            document.getElementById('final-tiempo').innerText = `Tiempo empleado: ${tiempo} segundos`;
            document.getElementById('final-precision').innerText = `Precisión energética: ${precision}%`;
            showScreen('screen-final');
        }

        function guardarPartida(t, p) {
            let partidas = JSON.parse(localStorage.getItem('partidas_energy') || '[]');
            let ahora = new Date();
            partidas.push({
                fecha: ahora.toISOString().split('T')[0],
                hora: ahora.toTimeString().split(' ')[0],
                tiempo: t,
                precision: p
            });
            localStorage.setItem('partidas_energy', JSON.stringify(partidas));
        }

        function verPartidas() {
            showScreen('screen-history');
            let partidas = JSON.parse(localStorage.getItem('partidas_energy') || '[]');
            let list = document.getElementById('history-list');
            list.innerHTML = "";
            
            if(partidas.length === 0) {
                list.innerHTML = "<div class='list-item'>No hay partidas guardadas</div>";
            } else {
                partidas.reverse().forEach(p => {
                    list.innerHTML += `<div class='list-item'>${p.fecha} ${p.hora} | Tiempo: ${p.tiempo}s | Precisión: ${p.precision}%</div>`;
                });
            }
        }
    </script>
</body>
</html>
