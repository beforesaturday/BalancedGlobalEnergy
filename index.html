<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balanced Global Energy - IA System</title>
    <style>
        :root {
            --primary: #00ffcc;
            --accent: #00aa88;
            --bg-dark: #111;
            --bg-map: #0a1f2e;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Pantallas */
        .screen { display: none; width: 100%; max-width: 1200px; padding: 20px; text-align: center; }
        .active { display: block; }

        h1 { color: var(--primary); font-size: 3rem; margin-bottom: 10px; }
        .subtitle { font-size: 1.2rem; margin-bottom: 30px; opacity: 0.8; }

        /* Botones */
        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            margin: 10px;
        }
        button:hover { background-color: var(--primary); color: #111; }

        /* Tab Layout */
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; border-bottom: 1px solid #444; }
        .tab { padding: 10px 30px; cursor: pointer; border: 1px solid transparent; }
        .tab.active-tab { border: 1px solid var(--primary); border-bottom: none; color: var(--primary); }

        /* Mapa y Canvas */
        #game-canvas {
            background-color: var(--bg-map);
            border: 2px solid #333;
            max-width: 100%;
            height: auto;
        }

        /* Consola IA */
        .console {
            background-color: #000;
            color: #00ff99;
            padding: 20px;
            font-family: 'Consolas', monospace;
            text-align: left;
            border: 2px solid #333;
            margin: 20px auto;
            max-width: 600px;
            min-height: 200px;
        }

        input {
            padding: 10px;
            font-size: 1rem;
            margin: 5px;
            width: 80px;
            background: #222;
            color: white;
            border: 1px solid #444;
        }

        .stats-list { list-style: none; padding: 0; }
        .history-table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        .history-table th, .history-table td { border: 1px solid #444; padding: 10px; }
    </style>
</head>
<body>

    <div id="screen-menu" class="screen active">
        <h1>BalancedGlobalEnergy</h1>
        <p class="subtitle">Sistema mundial de equilibrio energético</p>
        <button onclick="startGame()">INICIAR PARTIDA</button><br>
        <button onclick="showHistory()">PARTIDAS GUARDADAS</button>
    </div>

    <div id="screen-game" class="screen">
        <div id="timer-display" style="font-size: 1.5rem; font-weight: bold; margin-bottom: 10px;">Tiempo: 0s</div>
        
        <div class="tabs">
            <div id="tab-map" class="tab active-tab" onclick="switchTab('map')">Mapa Mundial</div>
            <div id="tab-ia" class="tab" onclick="switchTab('ia')">Ordenador IA</div>
        </div>

        <div id="content-map">
            <canvas id="game-canvas" width="1000" height="600"></canvas>
        </div>

        <div id="content-ia" style="display: none;">
            <h2>SISTEMA DE IA ENERGÉTICA</h2>
            <div id="ia-console" class="console"></div>
            <div style="margin-top: 20px;">
                <label>Número Origen: </label><input type="number" id="input-origin" min="1" max="7">
                <label>Cantidad (%): </label><input type="number" id="input-amount" min="1">
                <br><br>
                <button onclick="executeTransfer()">EJECUTAR IA</button>
            </div>
        </div>
    </div>

    <div id="screen-end" class="screen">
        <h1 style="color: var(--primary);">MISIÓN COMPLETADA</h1>
        <p id="final-stats" style="font-size: 1.5rem;"></p>
        <button onclick="location.reload()">VOLVER AL MENÚ</button>
    </div>

    <div id="screen-history" class="screen">
        <h1>HISTORIAL DE PARTIDAS</h1>
        <table class="history-table" id="history-body">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Tiempo</th>
                    <th>Precisión</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <br>
        <button onclick="showMenu()">VOLVER</button>
    </div>

    <script>
        const CONTINENTES = [
            { n: "América Norte", color: "#3498db", x: 150, y: 150, pts: [50,100, 200,80, 250,150, 230,250, 150,280] },
            { n: "América Sur", color: "#2ecc71", x: 250, y: 450, pts: [220,320, 280,350, 300,500, 240,550, 180,450] },
            { n: "Europa", color: "#f1c40f", x: 500, y: 150, pts: [450,100, 550,80, 580,180, 500,200, 450,150] },
            { n: "África", color: "#e67e22", x: 520, y: 380, pts: [480,250, 600,250, 650,450, 550,550, 450,450] },
            { n: "Asia", color: "#e74c3c", x: 800, y: 200, pts: [650,100, 950,80, 980,300, 800,350, 680,250] },
            { n: "Oceanía", color: "#9b59b6", x: 850, y: 500, pts: [820,450, 920,450, 950,550, 850,580, 800,500] },
            { n: "Antártida", color: "#95a5a6", x: 500, y: 570, pts: [200,570, 800,570, 800,590, 200,590] }
        ];

        let energias = [];
        let indexApagado = -1;
        let startTime, timerInterval;
        const IDEAL = 100 / 7;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame() {
            showScreen('screen-game');
            indexApagado = Math.floor(Math.random() * 7);
            
            // Generar energías aleatorias
            let pool = 100;
            energias = new Array(7).fill(0);
            let activos = [0,1,2,3,4,5,6].filter(i => i !== indexApagado);
            
            activos.forEach((idx, i) => {
                if (i === activos.length - 1) {
                    energias[idx] = pool;
                } else {
                    let val = Math.floor(Math.random() * 15) + 5;
                    energias[idx] = val;
                    pool -= val;
                }
            });

            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
            updateUI();
        }

        function updateTimer() {
            let segs = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('timer-display').innerText = `Tiempo: ${segs}s`;
        }

        function updateUI() {
            drawMap();
            updateConsole();
        }

        function drawMap() {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            CONTINENTES.forEach((cont, i) => {
                ctx.beginPath();
                ctx.moveTo(cont.pts[0], cont.pts[1]);
                for(let p=2; p<cont.pts.length; p+=2) ctx.lineTo(cont.pts[p], cont.pts[p+1]);
                ctx.closePath();
                
                ctx.fillStyle = (i === indexApagado) ? "#000" : cont.color;
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = "white";
                ctx.font = "bold 14px Arial";
                ctx.fillText(`${i+1}. ${cont.n}`, cont.x - 40, cont.y);
                ctx.fillText(`${energias[i].toFixed(1)}%`, cont.x - 20, cont.y + 20);
            });
        }

        function updateConsole() {
            let html = `=== RED ELÉCTRICA GLOBAL ===<br>CONTINENTE APAGADO: ${CONTINENTES[indexApagado].n}<br><br>`;
            CONTINENTES.forEach((c, i) => {
                html += `${i+1}. ${c.n} --> ${energias[i].toFixed(1)}%<br>`;
            });
            html += `<br>OBJETIVO IDEAL: ${IDEAL.toFixed(2)}%`;
            document.getElementById('ia-console').innerHTML = html;
        }

        function switchTab(type) {
            document.getElementById('content-map').style.display = type === 'map' ? 'block' : 'none';
            document.getElementById('content-ia').style.display = type === 'ia' ? 'block' : 'none';
            document.getElementById('tab-map').classList.toggle('active-tab', type === 'map');
            document.getElementById('tab-ia').classList.toggle('active-tab', type === 'ia');
            if(type === 'map') drawMap();
        }

        function executeTransfer() {
            let originIdx = parseInt(document.getElementById('input-origin').value) - 1;
            let amount = parseFloat(document.getElementById('input-amount').value);

            if (isNaN(originIdx) || originIdx < 0 || originIdx > 6 || originIdx === indexApagado) {
                alert("Índice de continente no válido."); return;
            }
            if (isNaN(amount) || amount <= 0 || amount > energias[originIdx]) {
                alert("Cantidad no válida."); return;
            }

            energias[originIdx] -= amount;
            energias[indexApagado] += amount;

            checkWin();
            updateUI();
        }

        function checkWin() {
            let diff = energias.reduce((acc, val) => acc + Math.abs(val - IDEAL), 0);
            let precision = Math.max(0, Math.floor(100 - diff * 2));
            
            // Si el jugador decide terminar (en esta versión web se asume que cada transferencia acerca al final)
            // Para ser fieles al original, podrías añadir un botón de "Finalizar Misión"
            // Aquí lo activamos si la precisión es alta o tras una acción.
            if (precision > 50) {
                if(confirm(`Precisión actual: ${precision}%. ¿Deseas finalizar la misión?`)) {
                    finishGame(precision);
                }
            }
        }

        function finishGame(precision) {
            clearInterval(timerInterval);
            let totalTime = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('final-stats').innerText = `Tiempo: ${totalTime}s | Precisión: ${precision}%`;
            
            // Guardar en LocalStorage (Simulando el JSON)
            let history = JSON.parse(localStorage.getItem('energy_history') || '[]');
            history.push({ 
                date: new Date().toLocaleDateString(), 
                time: totalTime, 
                precision: precision 
            });
            localStorage.setItem('energy_history', JSON.stringify(history));

            showScreen('screen-end');
        }

        function showHistory() {
            showScreen('screen-history');
            let history = JSON.parse(localStorage.getItem('energy_history') || '[]');
            let tbody = document.querySelector('#history-body tbody');
            tbody.innerHTML = history.map(h => `
                <tr>
                    <td>${h.date}</td>
                    <td>${h.time}s</td>
                    <td>${h.precision}%</td>
                </tr>
            `).join('');
        }

        function showMenu() { showScreen('screen-menu'); }
    </script>
</body>
</html>
