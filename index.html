<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BalancedGlobalEnergy - Mobile</title>
    <style>
        :root {
            --primary: #00ffcc;
            --accent: #00aa88;
            --bg-dark: #111;
            --bg-map: #0a1f2e;
            --neon-green: #00ff99;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .screen { display: none; width: 100%; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }

        /* Tipografía adaptable */
        h1 { font-size: 8vw; font-weight: bold; color: var(--primary); margin-bottom: 10px; text-align: center; }
        .subtitle { font-size: 4.5vw; margin-bottom: 40px; text-align: center; opacity: 0.9; }
        
        button {
            background-color: var(--accent);
            color: white;
            border: none;
            width: 85%;
            max-width: 400px;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 10px;
            cursor: pointer;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Sistema de Pestañas Móvil */
        .notebook { width: 100%; max-width: 600px; display: flex; flex-direction: column; height: 90vh; }
        .tabs { display: flex; background: #222; border-radius: 10px 10px 0 0; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; background: #333; border: 1px solid #444; font-size: 0.9rem; }
        .tab.active-tab { background: #111; border-bottom: none; color: var(--primary); font-weight: bold; }
        
        .content { flex-grow: 1; display: none; position: relative; background: #001219; border-radius: 0 0 10px 10px; overflow-y: auto; }
        .content.active-content { display: block; }

        /* Canvas Responsivo */
        #map-canvas { 
            width: 100% !important; 
            height: auto !important; 
            background-color: var(--bg-map);
        }

        /* Consola IA Móvil */
        .pc-container { padding: 15px; }
        .console-box {
            background: black;
            border: 3px ridge #444;
            width: 90%;
            height: 220px;
            margin: 10px auto;
            color: var(--neon-green);
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
            text-align: left;
            padding: 10px;
            overflow-y: auto;
        }
        input {
            font-size: 1.2rem;
            padding: 12px;
            width: 80%;
            margin: 8px;
            background: #222;
            border: 2px solid var(--accent);
            color: white;
            border-radius: 8px;
            text-align: center;
        }

        /* Historial */
        .listbox {
            background: #eee;
            color: black;
            width: 95%;
            height: 60vh;
            overflow-y: auto;
            font-family: monospace;
            margin: 15px 0;
            padding: 10px;
            border-radius: 8px;
        }
        .list-item { padding: 10px; border-bottom: 1px solid #ccc; font-size: 0.8rem; }
    </style>
</head>
<body>

    <!-- PANTALLA INICIO -->
    <div id="screen-menu" class="screen active">
        <h1>Balanced<br>GlobalEnergy</h1>
        <div class="subtitle">Equilibrio Energético Mundial</div>
        <button onclick="iniciarPartida()">INICIAR PARTIDA</button>
        <button onclick="verPartidas()">HISTORIAL</button>
    </div>

    <!-- PANTALLA JUEGO -->
    <div id="screen-game" class="screen" style="padding: 5px;">
        <div class="notebook">
            <div class="tabs">
                <div id="t-map" class="tab active-tab" onclick="switchTab('map')">MAPA</div>
                <div id="t-pc" class="tab" onclick="switchTab('pc')">CONSOLA IA</div>
            </div>

            <div id="c-map" class="content active-content">
                <div id="timer" style="text-align: center; padding: 10px; font-weight: bold;">Tiempo: 0s</div>
                <canvas id="map-canvas" width="1300" height="1300"></canvas>
            </div>

            <div id="c-pc" class="content" style="background-color: #111;">
                <div class="pc-container">
                    <div id="info-apagado" style="font-weight: bold; color: var(--primary); margin-bottom: 5px;">APAGÓN EN: ---</div>
                    <div class="console-box" id="ia-text"></div>
                    <input type="number" id="input-cont" placeholder="ID Continente (1-7)">
                    <input type="number" id="input-energia" placeholder="% a transferir">
                    <button onclick="resolver()" style="width: 90%; height: 55px; background: var(--neon-green); color: black;">EJECUTAR</button>
                    <button onclick="showScreen('screen-menu')" style="background: #444; width: 90%; font-size: 1rem; height: 45px;">ABANDONAR</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PANTALLA FINAL -->
    <div id="screen-final" class="screen">
        <h1 style="color: var(--neon-green);">¡MISIÓN LOGRADA!</h1>
        <div id="final-tiempo" class="subtitle"></div>
        <div id="final-precision" class="subtitle"></div>
        <button onclick="showScreen('screen-menu')">VOLVER AL INICIO</button>
    </div>

    <!-- PANTALLA HISTORIAL -->
    <div id="screen-history" class="screen">
        <h1>REGISTROS</h1>
        <div id="history-list" class="listbox"></div>
        <button onclick="showScreen('screen-menu')">VOLVER</button>
    </div>

    <script>
        const CONTINENTES = ["América Norte", "América Sur", "Europa", "África", "Asia", "Oceanía", "Antártida"];
        const COLORES = {
            "América Norte": "#3498db", "América Sur": "#2ecc71", "Europa": "#f1c40f",
            "África": "#e67e22", "Asia": "#e74c3c", "Oceanía": "#9b59b6", "Antártida": "#95a5a6"
        };
        const IDEAL = 14.28; // 100 / 7

        let energias = {};
        let apagado = "";
        let startTime = 0;
        let timerInterval;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'screen-menu') clearInterval(timerInterval);
        }

        function switchTab(tab) {
            document.getElementById('t-map').className = tab === 'map' ? 'tab active-tab' : 'tab';
            document.getElementById('t-pc').className = tab === 'pc' ? 'tab active-tab' : 'tab';
            document.getElementById('c-map').className = tab === 'map' ? 'content active-content' : 'content';
            document.getElementById('c-pc').className = tab === 'pc' ? 'content active-content' : 'content';
        }

        function iniciarPartida() {
            showScreen('screen-game');
            switchTab('map');
            startTime = Date.now();
            apagado = CONTINENTES[Math.floor(Math.random() * CONTINENTES.length)];
            
            let restantes = 100;
            let activos = CONTINENTES.filter(c => c !== apagado);
            let porcentajes = [];

            for(let i=0; i < activos.length - 1; i++) {
                let valor = Math.floor(Math.random() * 16) + 8;
                porcentajes.push(valor);
                restantes -= valor;
            }
            porcentajes.push(restantes);
            porcentajes.sort(() => Math.random() - 0.5);

            CONTINENTES.forEach(c => energias[c] = 0);
            activos.forEach((c, i) => energias[c] = porcentajes[i]);

            document.getElementById('info-apagado').innerText = `APAGÓN EN: ${apagado.toUpperCase()}`;
            timerInterval = setInterval(() => {
                document.getElementById('timer').innerText = `Tiempo: ${Math.floor((Date.now() - startTime) / 1000)}s`;
            }, 1000);
            updateUI();
        }

        function updateUI() {
            renderMapa();
            renderConsola();
        }

        function renderMapa() {
            const canvas = document.getElementById('map-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            function drawPolygon(pts, name, id, x, y) {
                ctx.beginPath();
                ctx.moveTo(pts[0], pts[1]);
                for(let i=2; i<pts.length; i+=2) ctx.lineTo(pts[i], pts[i+1]);
                ctx.closePath();
                ctx.fillStyle = (name === apagado) ? "#000" : COLORES[name];
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 5;
                ctx.stroke();

                ctx.fillStyle = "white";
                ctx.font = "bold 35px Arial";
                ctx.textAlign = "center";
                ctx.fillText(`${id}. ${name}`, x, y);
                ctx.fillText(`${energias[name]}%`, x, y + 45);
            }

            // Coordenadas ajustadas para vista vertical de móvil
            drawPolygon([100,100, 500,50, 600,300, 300,500, 50,400], "América Norte", 1, 300, 250);
            drawPolygon([150,550, 450,550, 450,900, 150,900], "América Sur", 2, 300, 750);
            drawPolygon([700,50, 1100,50, 1100,250, 700,250], "Europa", 3, 900, 150);
            drawPolygon([650,350, 1000,350, 1000,750, 650,750], "África", 4, 825, 550);
            drawPolygon([1050,300, 1250,300, 1250,800, 1050,800], "Asia", 5, 1150, 550);
            drawPolygon([800,850, 1200,850, 1200,1100, 800,1100], "Oceanía", 6, 1000, 1000);
            
            // Antártida base
            ctx.fillStyle = (apagado === "Antártida") ? "black" : COLORES["Antártida"];
            ctx.fillRect(100, 1150, 1100, 100);
            ctx.strokeStyle = "white";
            ctx.strokeRect(100, 1150, 1100, 100);
            ctx.fillStyle = "white";
            ctx.fillText("7. Antártida " + energias["Antártida"] + "%", 650, 1215);
        }

        function renderConsola() {
            let txt = "ESTADO DE CARGA:\n\n";
            CONTINENTES.forEach((c, i) => {
                txt += `${i+1}. ${c.padEnd(15)} > ${energias[c]}%\n`;
            });
            txt += `\nOBJETIVO: ${IDEAL}% c/u`;
            document.getElementById('ia-text').innerText = txt;
        }

        function resolver() {
            let idx = parseInt(document.getElementById('input-cont').value) - 1;
            let cant = parseFloat(document.getElementById('input-energia').value);

            if(isNaN(idx) || idx < 0 || idx >= 7 || isNaN(cant)) return;
            let origen = CONTINENTES[idx];

            if(origen === apagado || cant <= 0 || energias[origen] < cant) {
                alert("Error: Datos inválidos o energía insuficiente");
                return;
            }

            energias[origen] = parseFloat((energias[origen] - cant).toFixed(1));
            energias[apagado] = parseFloat((energias[apagado] + cant).toFixed(1));

            let diferencia = 0;
            CONTINENTES.forEach(c => diferencia += Math.abs(energias[c] - IDEAL));
            let precision = Math.max(0, Math.floor(100 - diferencia * 2));
            let tiempo = Math.floor((Date.now() - startTime) / 1000);

            if(energias[apagado] > 0) {
                guardarPartida(tiempo, precision);
                document.getElementById('final-tiempo').innerText = `Tiempo: ${tiempo}s`;
                document.getElementById('final-precision').innerText = `Precisión: ${precision}%`;
                showScreen('screen-final');
            } else {
                updateUI();
            }
        }

        function guardarPartida(t, p) {
            let partidas = JSON.parse(localStorage.getItem('energy_saves') || '[]');
            partidas.push({ fecha: new Date().toLocaleDateString(), tiempo: t, precision: p });
            localStorage.setItem('energy_saves', JSON.stringify(partidas));
        }

        function verPartidas() {
            showScreen('screen-history');
            let partidas = JSON.parse(localStorage.getItem('energy_saves') || '[]');
            let list = document.getElementById('history-list');
            list.innerHTML = partidas.length ? "" : "No hay registros";
            partidas.reverse().forEach(p => {
                list.innerHTML += `<div class='list-item'>${p.fecha} | ${p.tiempo}s | Precisión: ${p.precision}%</div>`;
            });
        }
    </script>
</body>
</html>
