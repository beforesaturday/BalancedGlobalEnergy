<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balanced Global Energy - IA System</title>
    <style>
        :root {
            --primary: #00ffcc;
            --accent: #00aa88;
            --bg-dark: #111;
            --bg-map: #0a1f2e;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .screen { display: none; width: 100%; max-width: 1200px; padding: 20px; text-align: center; }
        .active { display: block; }

        h1 { color: var(--primary); font-size: 3rem; margin: 20px 0 10px 0; }
        .subtitle { font-size: 1.2rem; margin-bottom: 30px; opacity: 0.8; }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            margin: 10px;
        }
        button:hover { background-color: var(--primary); color: #111; }

        .tabs { display: flex; justify-content: center; margin-bottom: 20px; border-bottom: 1px solid #444; }
        .tab { padding: 10px 30px; cursor: pointer; border: 1px solid transparent; transition: 0.3s; }
        .tab.active-tab { border: 1px solid var(--primary); border-bottom: none; color: var(--primary); background: #222; }

        #game-canvas {
            background-color: var(--bg-map);
            border: 2px solid #333;
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .console {
            background-color: #000;
            color: #00ff99;
            padding: 20px;
            font-family: 'Consolas', monospace;
            text-align: left;
            border: 2px solid #333;
            margin: 20px auto;
            max-width: 600px;
            min-height: 250px;
            line-height: 1.4;
        }

        input {
            padding: 10px;
            font-size: 1rem;
            margin: 5px;
            width: 100px;
            background: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
        }

        .history-table { width: 100%; margin-top: 20px; border-collapse: collapse; background: #1a1a1a; }
        .history-table th, .history-table td { border: 1px solid #444; padding: 12px; text-align: center; }
        .history-table th { background-color: var(--accent); }
    </style>
</head>
<body>

    <!-- MENÚ PRINCIPAL -->
    <div id="screen-menu" class="screen active">
        <h1>BalancedGlobalEnergy</h1>
        <p class="subtitle">Sistema mundial de equilibrio energético</p>
        <button onclick="startGame()">INICIAR PARTIDA</button><br>
        <button onclick="showHistory()">PARTIDAS GUARDADAS</button>
    </div>

    <!-- JUEGO -->
    <div id="screen-game" class="screen">
        <div id="timer-display" style="font-size: 1.8rem; font-weight: bold; margin-bottom: 15px; color: var(--primary);">Tiempo: 0s</div>
        
        <div class="tabs">
            <div id="tab-map" class="tab active-tab" onclick="switchTab('map')">Mapa Mundial</div>
            <div id="tab-ia" class="tab" onclick="switchTab('ia')">Ordenador IA</div>
        </div>

        <div id="content-map">
            <canvas id="game-canvas" width="1000" height="600"></canvas>
        </div>

        <div id="content-ia" style="display: none;">
            <h2>SISTEMA DE CONTROL DE IA</h2>
            <div id="ia-console" class="console"></div>
            <div style="background: #222; padding: 20px; border-radius: 8px; display: inline-block;">
                <label>ID Origen (1-7): </label><input type="number" id="input-origin" min="1" max="7">
                <label>Transferir (%): </label><input type="number" id="input-amount" step="0.1">
                <br><br>
                <button onclick="executeTransfer()">EJECUTAR TRANSFERENCIA</button>
            </div>
        </div>
    </div>

    <!-- PANTALLA FINAL -->
    <div id="screen-end" class="screen">
        <h1 style="color: var(--primary);">MISIÓN COMPLETADA</h1>
        <div style="background: #222; padding: 30px; border-radius: 15px; display: inline-block; margin-bottom: 20px;">
            <p id="final-stats" style="font-size: 1.8rem; margin: 0;"></p>
        </div>
        <br>
        <button onclick="location.reload()">NUEVA PARTIDA</button>
    </div>

    <!-- HISTORIAL -->
    <div id="screen-history" class="screen">
        <h1>REGISTRO DE OPERACIONES</h1>
        <div style="overflow-x: auto;">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Tiempo Empleado</th>
                        <th>Precisión IA</th>
                    </tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
        <br>
        <button onclick="showMenu()">VOLVER AL MENÚ</button>
    </div>

    <script>
        const CONTINENTES = [
            { n: "América Norte", color: "#3498db", x: 150, y: 150, pts: [50,100, 200,80, 250,150, 230,250, 150,280] },
            { n: "América Sur", color: "#2ecc71", x: 250, y: 450, pts: [220,320, 280,350, 300,500, 240,550, 180,450] },
            { n: "Europa", color: "#f1c40f", x: 500, y: 150, pts: [450,100, 550,80, 580,180, 500,200, 450,150] },
            { n: "África", color: "#e67e22", x: 520, y: 380, pts: [480,250, 600,250, 650,450, 550,550, 450,450] },
            { n: "Asia", color: "#e74c3c", x: 800, y: 200, pts: [650,100, 950,80, 980,300, 800,350, 680,250] },
            { n: "Oceanía", color: "#9b59b6", x: 850, y: 500, pts: [820,450, 920,450, 950,550, 850,580, 800,500] },
            { n: "Antártida", color: "#95a5a6", x: 500, y: 570, pts: [200,570, 800,570, 800,590, 200,590] }
        ];

        let energias = [];
        let indexApagado = -1;
        let startTime, timerInterval;
        const IDEAL = 100 / 7;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame() {
            showScreen('screen-game');
            indexApagado = Math.floor(Math.random() * 7);
            
            energias = new Array(7).fill(0);
            let indicesActivos = [0,1,2,3,4,5,6].filter(i => i !== indexApagado);
            let pool = 100;

            indicesActivos.forEach((idx, i) => {
                if (i === indicesActivos.length - 1) {
                    energias[idx] = Math.round(pool * 10) / 10;
                } else {
                    let val = Math.floor(Math.random() * 15) + 8;
                    energias[idx] = val;
                    pool -= val;
                }
            });

            energias[indexApagado] = 0; // Garantizamos que el apagado empiece en 0

            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
            updateUI();
        }

        function updateTimer() {
            let segs = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('timer-display').innerText = `Tiempo: ${segs}s`;
        }

        function updateUI() {
            drawMap();
            updateConsole();
        }

        function drawMap() {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            CONTINENTES.forEach((cont, i) => {
                ctx.beginPath();
                ctx.moveTo(cont.pts[0], cont.pts[1]);
                for(let p=2; p<cont.pts.length; p+=2) ctx.lineTo(cont.pts[p], cont.pts[p+1]);
                ctx.closePath();
                
                ctx.fillStyle = (i === indexApagado) ? "#000000" : cont.color;
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = i === indexApagado ? 3 : 1;
                ctx.stroke();

                ctx.fillStyle = "white";
                ctx.font = "bold 14px Arial";
                ctx.shadowColor = "black";
                ctx.shadowBlur = 4;
                ctx.fillText(`${i+1}. ${cont.n}`, cont.x - 40, cont.y);
                ctx.fillText(`${energias[i].toFixed(1)}%`, cont.x - 20, cont.y + 20);
                ctx.shadowBlur = 0;
            });
        }

        function updateConsole() {
            let html = `> INICIANDO DIAGNÓSTICO...<br>> CONTINENTE APAGADO: <span style="color:red">${CONTINENTES[indexApagado].n.toUpperCase()}</span><br><br>`;
            CONTINENTES.forEach((c, i) => {
                let status = (i === indexApagado) ? "OFFLINE" : "ONLINE";
                html += `${i+1}. ${c.n.padEnd(15, '.')} ${energias[i].toFixed(1)}% [${status}]<br>`;
            });
            html += `<br>> OBJETIVO IDEAL: ${IDEAL.toFixed(2)}% por nodo.`;
            document.getElementById('ia-console').innerHTML = html;
        }

        function switchTab(type) {
            document.getElementById('content-map').style.display = type === 'map' ? 'block' : 'none';
            document.getElementById('content-ia').style.display = type === 'ia' ? 'block' : 'none';
            document.getElementById('tab-map').className = type === 'map' ? 'tab active-tab' : 'tab';
            document.getElementById('tab-ia').className = type === 'ia' ? 'tab active-tab' : 'tab';
        }

        function executeTransfer() {
            let originIdx = parseInt(document.getElementById('input-origin').value) - 1;
            let amount = parseFloat(document.getElementById('input-amount').value);

            if (isNaN(originIdx) || originIdx < 0 || originIdx > 6 || originIdx === indexApagado) {
                alert("ERROR: ID de origen inválido o nodo fuera de servicio."); return;
            }
            if (isNaN(amount) || amount <= 0 || amount > energias[originIdx]) {
                alert("ERROR: Cantidad energética insuficiente en el nodo de origen."); return;
            }

            energias[originIdx] = Math.round((energias[originIdx] - amount) * 10) / 10;
            energias[indexApagado] = Math.round((energias[indexApagado] + amount) * 10) / 10;

            updateUI();
            
            let diff = energias.reduce((acc, val) => acc + Math.abs(val - IDEAL), 0);
            let precision = Math.max(0, Math.floor(100 - diff * 2));
            
            if (precision >= 85) {
                setTimeout(() => finishGame(precision), 500);
            } else {
                alert(`Transferencia exitosa. Precisión del sistema: ${precision}%.\n(Necesitas >85% para completar la misión)`);
            }
        }

        function finishGame(precision) {
            clearInterval(timerInterval);
            let totalTime = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('final-stats').innerText = `Tiempo: ${totalTime}s | Precisión: ${precision}%`;
            
            let history = JSON.parse(localStorage.getItem('energy_history') || '[]');
            history.push({ 
                date: new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString(), 
                time: totalTime, 
                precision: precision 
            });
            localStorage.setItem('energy_history', JSON.stringify(history));

            showScreen('screen-end');
        }

        function showHistory() {
            showScreen('screen-history');
            let history = JSON.parse(localStorage.getItem('energy_history') || '[]');
            let tbody = document.getElementById('history-body');
            tbody.innerHTML = history.reverse().map(h => `
                <tr>
                    <td>${h.date}</td>
                    <td>${h.time} segundos</td>
                    <td>${h.precision}%</td>
                </tr>
            `).join('');
            if(history.length === 0) tbody.innerHTML = "<tr><td colspan='3'>No hay registros disponibles.</td></tr>";
        }

        function showMenu() { showScreen('screen-menu'); }
    </script>
</body>
</html>
